<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mazmorra // dungeon crawler</title>
<style>
  :root{
    --bg: #12141c;
    --panel: #1a1e2a;
    --wall: #3a4256;
    --wall-locked: #8a2b2b;
    --wall-cracked: #55606e;
    --wall-sealed: #c97a2b;
    --floor: #20242f;
    --floor-line: #262b39;
    --accent: #4fd1c5;
    --accent2: #f4d35e;
    --danger: #e2555a;
    --text: #d9dce3;
    --muted: #6b7280;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; height:100%; background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif; overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }
  #app{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100%; gap:10px; padding:10px;
  }
  #title{
    font-size:13px; letter-spacing:3px; text-transform:uppercase; color:var(--muted);
  }
  #stage{
    position:relative;
    box-shadow: 0 0 0 2px #000, 0 10px 40px rgba(0,0,0,.6);
    border-radius:6px; overflow:hidden;
  }
  canvas{ display:block; background:var(--bg); image-rendering: pixelated; }
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:10px 14px; pointer-events:none;
    font-size:14px;
  }
  #hearts{ display:flex; gap:6px; }
  .heart{ width:16px; height:16px; }
  #resources{ display:flex; gap:16px; align-items:center; margin-top:4px; }
  .res-item{ display:flex; align-items:center; gap:6px; }
  #minimap{
    display:grid; gap:2px; background: rgba(0,0,0,.35); padding:6px; border-radius:4px;
  }
  .mm-cell{ width:10px; height:10px; border-radius:2px; background:#232838; }
  .mm-cell.visited{ background: var(--wall); }
  .mm-cell.current{ background: var(--accent); }
  .mm-cell.boss{ background: var(--danger); }
  .mm-cell.item{ background: var(--accent2); }
  #msg{
    position:absolute; left:50%; top:40%; transform:translate(-50%,-50%);
    text-align:center; font-size:22px; letter-spacing:2px; text-transform:uppercase;
    color: var(--text); text-shadow: 0 2px 12px rgba(0,0,0,.8); display:none;
    pointer-events:none;
  }
  #msg span{ display:block; font-size:13px; color:var(--muted); margin-top:8px; letter-spacing:1px; }
  #hint{
    font-size:12px; color: var(--muted); letter-spacing:1px;
  }
  #restart{
    pointer-events:auto; margin-top:14px; padding:8px 18px; background:var(--accent);
    border:none; border-radius:4px; color:#0b1410; font-weight:600; letter-spacing:1px;
    cursor:pointer; display:none; text-transform:uppercase; font-size:12px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="title">Mazmorra generada &mdash; prototipo inicial</div>
  <div id="stage">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="hud">
      <div>
        <div id="hearts"></div>
        <div id="resources">
          <div class="res-item">
            <svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#111" stroke="var(--accent2)" stroke-width="2"/></svg>
            <span id="bombCount">0</span>
          </div>
          <div class="res-item" id="keyWrap" style="display:none;">
            <svg width="16" height="16"><circle cx="6" cy="6" r="4" fill="none" stroke="var(--accent2)" stroke-width="2"/><rect x="9" y="5" width="6" height="2.4" fill="var(--accent2)"/></svg>
            <span>llave</span>
          </div>
        </div>
      </div>
      <div id="minimap"></div>
    </div>
    <div id="msg"><div id="msgText"></div><span id="msgSub"></span></div>
    <button id="restart">Reintentar</button>
  </div>
  <div id="hint">flechas / WASD: moverse &nbsp;&middot;&nbsp; espacio: golpe &nbsp;&middot;&nbsp; B: bomba</div>
</div>

<script>
(function(){
  "use strict";

  // ---------- Config ----------
  const CANVAS_W = 800, CANVAS_H = 600;
  const WALL = 26;
  const ROOM_W = CANVAS_W - WALL*2;
  const ROOM_H = CANVAS_H - WALL*2;
  const DOOR_GAP = 110;
  const GRID_ROOMS = 9; // approx number of main rooms

  const COLORS = {
    floor: '#20242f',
    floorLine: '#262b39',
    wall: '#3a4256',
    wallLocked: '#8a2b2b',
    wallCracked: '#55606e',
    wallSealed: '#c97a2b',
    player: '#4fd1c5',
    playerNose: '#eafffb',
    chaser: '#e2555a',
    turret: '#caa23a',
    projectile: '#ffdd57',
    bomb: '#111318',
    bombFuse: '#ffb020',
    chest: '#f4d35e',
    chestBoss: '#e2555a',
    obstacle: '#2a2f3d',
    obstacleEdge: '#3a4256',
    explosion: 'rgba(255,176,32,0.55)'
  };

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // ---------- Utils ----------
  function rectsOverlap(a,b){
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function dist(x1,y1,x2,y2){ return Math.hypot(x2-x1, y2-y1); }
  function randInt(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
  function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  const DIRS = [
    {dx:0, dy:-1, name:'N', opp:'S'},
    {dx:0, dy:1,  name:'S', opp:'N'},
    {dx:1, dy:0,  name:'E', opp:'W'},
    {dx:-1,dy:0,  name:'W', opp:'E'}
  ];

  function roomKey(x,y){ return x+','+y; }
  function doorKey(x1,y1,x2,y2){
    if(x1>x2 || (x1===x2 && y1>y2)){
      const t1=x1,t2=y1; x1=x2; y1=y2; x2=t1; y2=t2;
    }
    return x1+','+y1+'|'+x2+','+y2;
  }

  // ---------- Dungeon generation ----------
  function generateDungeon(){
    const rooms = new Map();      // key -> room meta {x,y,type,dist}
    const doors = new Map();      // doorKey -> {state, coords:[a,b]}
    const start = {x:0,y:0};
    rooms.set(roomKey(0,0), {x:0,y:0,type:'start',dist:0});

    const frontier = [{x:0,y:0}];
    let created = 1;
    // random-walk growth with backtracking to build a connected graph
    const order = [{x:0,y:0}];
    while(created < GRID_ROOMS && frontier.length){
      const from = frontier[randInt(0, frontier.length-1)];
      const dirsShuffled = [...DIRS].sort(()=>Math.random()-0.5);
      let placed = false;
      for(const d of dirsShuffled){
        const nx = from.x+d.dx, ny = from.y+d.dy;
        const k = roomKey(nx,ny);
        if(rooms.has(k)) continue;
        if(Math.random() < 0.55) continue; // add some randomness/sparsity
        rooms.set(k, {x:nx,y:ny,type:'normal',dist: (rooms.get(roomKey(from.x,from.y)).dist)+1});
        doors.set(doorKey(from.x,from.y,nx,ny), {state:'open'});
        frontier.push({x:nx,y:ny});
        order.push({x:nx,y:ny});
        created++;
        placed = true;
        break;
      }
      if(!placed){
        // remove exhausted node from frontier to avoid infinite loop
        const idx = frontier.indexOf(from);
        if(idx>=0) frontier.splice(idx,1);
      }
    }

    // ensure at least a small dungeon even if unlucky
    if(rooms.size < 4){
      // force line extension east
      let last = {x:0,y:0};
      for(let i=1;i<5;i++){
        const nx = last.x+1, ny = last.y;
        const k = roomKey(nx,ny);
        if(!rooms.has(k)){
          rooms.set(k, {x:nx,y:ny,type:'normal',dist:i});
          doors.set(doorKey(last.x,last.y,nx,ny), {state:'open'});
        }
        last = {x:nx,y:ny};
      }
    }

    // find dead-ends (rooms with exactly 1 connection), excluding start
    function neighborsOf(x,y){
      const res = [];
      for(const d of DIRS){
        const nx=x+d.dx, ny=y+d.dy;
        if(rooms.has(roomKey(nx,ny))) res.push({x:nx,y:ny,dir:d});
      }
      return res;
    }

    const deadEnds = [];
    for(const [k,r] of rooms){
      if(r.type==='start') continue;
      if(neighborsOf(r.x,r.y).length===1) deadEnds.push(r);
    }
    deadEnds.sort((a,b)=>b.dist-a.dist);

    // boss room = farthest dead end (or farthest room if no dead end)
    let bossRoom = deadEnds[0];
    if(!bossRoom){
      let farthest = null;
      for(const [,r] of rooms){ if(r.type==='start') continue; if(!farthest || r.dist>farthest.dist) farthest = r; }
      bossRoom = farthest;
    }
    bossRoom.type = 'boss';

    // item room = another dead end, not boss
    let itemRoom = deadEnds.find(r => r!==bossRoom);
    if(!itemRoom){
      // pick any normal room that's not boss/start
      for(const [,r] of rooms){ if(r.type==='normal'){ itemRoom = r; break; } }
    }
    if(itemRoom) itemRoom.type = 'item';

    // key room = a normal room roughly along the path to boss, not start/boss/item
    const candidates = [...rooms.values()].filter(r => r.type==='normal' && r.dist>=1);
    let keyRoom = candidates.length ? choice(candidates) : null;
    if(keyRoom) keyRoom.type = 'key';

    // lock the door leading into the boss room
    const bossNeighbors = neighborsOf(bossRoom.x,bossRoom.y);
    if(bossNeighbors.length){
      const bn = bossNeighbors[0];
      const dk = doorKey(bossRoom.x,bossRoom.y,bn.x,bn.y);
      doors.get(dk).state = 'locked';
    }

    // secret room: attach one extra room off a random existing room via a cracked wall
    const allRoomsArr = [...rooms.values()];
    let secretRoom = null;
    for(let attempt=0; attempt<20 && !secretRoom; attempt++){
      const base = choice(allRoomsArr);
      const dirsShuffled = [...DIRS].sort(()=>Math.random()-0.5);
      for(const d of dirsShuffled){
        const nx = base.x+d.dx, ny = base.y+d.dy;
        const k = roomKey(nx,ny);
        if(rooms.has(k)) continue;
        secretRoom = {x:nx,y:ny,type:'secret',dist:base.dist+1};
        rooms.set(k, secretRoom);
        doors.set(doorKey(base.x,base.y,nx,ny), {state:'cracked'});
        break;
      }
    }

    return { rooms, doors, startCoord:{x:0,y:0}, bossRoom, itemRoom, keyRoom, secretRoom };
  }

  // ---------- Room instance (runtime state) ----------
  function makeObstacles(type){
    const obs = [];
    if(type==='start' || type==='item' || type==='secret') return obs;
    const n = randInt(0,2);
    for(let i=0;i<n;i++){
      const w = randInt(40,70), h = randInt(40,70);
      obs.push({
        x: randInt(60, ROOM_W-60-w),
        y: randInt(60, ROOM_H-60-h),
        w, h
      });
    }
    return obs;
  }

  function makeEnemies(type, dist){
    const enemies = [];
    if(type==='start' || type==='item' || type==='secret') return enemies;
    const count = type==='boss' ? 1 : Math.min(1 + Math.floor(dist/2), 4);
    for(let i=0;i<count;i++){
      const isBoss = type==='boss';
      const isTurret = !isBoss && Math.random() < 0.35;
      const x = randInt(80, ROOM_W-80);
      const y = randInt(80, ROOM_H-80);
      enemies.push({
        type: isBoss ? 'boss' : (isTurret ? 'turret' : 'chaser'),
        x, y,
        hp: isBoss ? 10 : (isTurret ? 2 : 2),
        maxHp: isBoss ? 10 : (isTurret ? 2 : 2),
        r: isBoss ? 26 : (isTurret ? 14 : 13),
        speed: isBoss ? 70 : (isTurret ? 0 : 60 + dist*4),
        shootCd: 0,
        hitFlash: 0
      });
    }
    return enemies;
  }

  function buildRoomInstance(meta){
    return {
      meta,
      obstacles: makeObstacles(meta.type),
      enemies: makeEnemies(meta.type, meta.dist),
      cleared: (meta.type==='start' || meta.type==='item' || meta.type==='secret'),
      visited: false,
      chestTaken: false
    };
  }

  // ---------- Game state ----------
  let dungeon, roomInstances, current, player, bombs, projectiles, particles;
  let keys = {};
  let gameOver = false, gameWon = false;
  let shake = 0;

  function newGame(){
    dungeon = generateDungeon();
    roomInstances = new Map();
    for(const [k, meta] of dungeon.rooms){
      roomInstances.set(k, buildRoomInstance(meta));
    }
    current = {x:0,y:0};
    roomInstances.get(roomKey(0,0)).visited = true;

    player = {
      x: ROOM_W/2, y: ROOM_H/2,
      w: 22, h: 22,
      speed: 190,
      dir: {x:0, y:1},
      hp: 6, maxHp: 6,
      bombs: 3, maxBombs: 6,
      hasKey: false,
      invuln: 0,
      attackCd: 0,
      attacking: 0
    };
    bombs = [];
    projectiles = [];
    particles = [];
    gameOver = false;
    gameWon = false;
    shake = 0;
    document.getElementById('msg').style.display = 'none';
    document.getElementById('restart').style.display = 'none';
    buildMinimap();
  }

  function curInst(){ return roomInstances.get(roomKey(current.x, current.y)); }

  function getDoorState(x1,y1,x2,y2){
    const dk = doorKey(x1,y1,x2,y2);
    const d = dungeon.doors.get(dk);
    return d ? d.state : null;
  }

  function isDoorPassable(x1,y1,x2,y2){
    const inst = curInst();
    if(!inst.cleared) return false; // sealed during combat
    const st = getDoorState(x1,y1,x2,y2);
    return st === 'open';
  }

  // ---------- Input ----------
  window.addEventListener('keydown', e=>{
    keys[e.code] = true;
    if(e.code==='Space') e.preventDefault();
  });
  window.addEventListener('keyup', e=>{ keys[e.code] = false; });

  document.getElementById('restart').addEventListener('click', newGame);

  // ---------- Combat ----------
  function playerAttackHitbox(){
    const reach = 34;
    const w = 30, h = 30;
    let x = player.x, y = player.y;
    if(player.dir.x>0) x += player.w/2;
    else if(player.dir.x<0) x -= player.w/2 + w;
    else x -= w/2;
    if(player.dir.y>0) y += player.h/2;
    else if(player.dir.y<0) y -= player.h/2 + h;
    else if(player.dir.x!==0) y -= h/2;
    return {x, y, w, h};
  }

  function spawnParticles(x,y,color,n){
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2;
      const sp = 40+Math.random()*100;
      particles.push({x,y,vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.4+Math.random()*0.3, color});
    }
  }

  function damagePlayer(amount){
    if(player.invuln>0) return;
    player.hp = Math.max(0, player.hp-amount);
    player.invuln = 1.0;
    shake = 8;
    if(player.hp<=0){ gameOver = true; showMessage('Has caido', 'pulsa reintentar'); }
  }

  function tryOpenLockedDoor(nx, ny){
    if(player.hasKey){
      const dk = doorKey(current.x,current.y,nx,ny);
      const d = dungeon.doors.get(dk);
      if(d && d.state==='locked'){
        d.state = 'open';
        player.hasKey = false;
        spawnParticles(player.x, player.y, COLORS.chest, 20);
        return true;
      }
    }
    return false;
  }

  function tryBreakCrackedNear(bx,by){
    for(const d of DIRS){
      const nx = current.x+d.dx, ny = current.y+d.dy;
      const dk = doorKey(current.x,current.y,nx,ny);
      const door = dungeon.doors.get(dk);
      if(door && door.state==='cracked'){
        // check bomb is near that wall side
        let near = false;
        if(d.name==='N' && by < 60) near = true;
        if(d.name==='S' && by > ROOM_H-60) near = true;
        if(d.name==='E' && bx > ROOM_W-60) near = true;
        if(d.name==='W' && bx < 60) near = true;
        if(near){
          door.state = 'open';
          spawnParticles(bx,by, COLORS.wallCracked, 24);
        }
      }
    }
  }

  // ---------- Update ----------
  function moveToRoom(nx, ny, entrySide){
    current = {x:nx, y:ny};
    const inst = curInst();
    inst.visited = true;
    // place player on opposite side of the entry
    const margin = 50;
    if(entrySide==='N'){ player.x = ROOM_W/2; player.y = ROOM_H - margin; }
    else if(entrySide==='S'){ player.x = ROOM_W/2; player.y = margin; }
    else if(entrySide==='E'){ player.x = margin; player.y = ROOM_H/2; }
    else if(entrySide==='W'){ player.x = ROOM_W - margin; player.y = ROOM_H/2; }
    buildMinimap();
  }

  function update(dt){
    if(gameOver || gameWon) return;

    // player movement
    let mx=0, my=0;
    if(keys['ArrowLeft']||keys['KeyA']) mx -= 1;
    if(keys['ArrowRight']||keys['KeyD']) mx += 1;
    if(keys['ArrowUp']||keys['KeyW']) my -= 1;
    if(keys['ArrowDown']||keys['KeyS']) my += 1;
    if(mx!==0||my!==0){
      const len = Math.hypot(mx,my);
      mx/=len; my/=len;
      player.dir = {x:mx,y:my};
    }
    const nx = player.x + mx*player.speed*dt;
    const ny = player.y + my*player.speed*dt;

    // obstacle collision (simple AABB resolve, axis separated)
    const inst = curInst();
    let px = nx, py = player.y;
    const pRectX = {x:px-player.w/2, y:py-player.h/2, w:player.w, h:player.h};
    for(const o of inst.obstacles){ if(rectsOverlap(pRectX,o)){ px = player.x; break; } }
    let py2 = ny;
    const pRectY = {x:px-player.w/2, y:py2-player.h/2, w:player.w, h:player.h};
    for(const o of inst.obstacles){ if(rectsOverlap(pRectY,o)){ py2 = player.y; break; } }
    player.x = px; player.y = py2;

    // room bounds / door transitions
    const gapMin = (ROOM_H-DOOR_GAP)/2, gapMax = (ROOM_H+DOOR_GAP)/2;
    const gapMinX = (ROOM_W-DOOR_GAP)/2, gapMaxX = (ROOM_W+DOOR_GAP)/2;

    if(player.x < 0){
      const passable = isDoorPassable(current.x,current.y,current.x-1,current.y) && player.y>gapMin && player.y<gapMax;
      if(passable) moveToRoom(current.x-1, current.y, 'W');
      else { tryOpenLockedDoor(current.x-1,current.y); player.x = 0; }
    }
    if(player.x > ROOM_W){
      const passable = isDoorPassable(current.x,current.y,current.x+1,current.y) && player.y>gapMin && player.y<gapMax;
      if(passable) moveToRoom(current.x+1, current.y, 'E');
      else { tryOpenLockedDoor(current.x+1,current.y); player.x = ROOM_W; }
    }
    if(player.y < 0){
      const passable = isDoorPassable(current.x,current.y,current.x,current.y-1) && player.x>gapMinX && player.x<gapMaxX;
      if(passable) moveToRoom(current.x, current.y-1, 'N');
      else { tryOpenLockedDoor(current.x,current.y-1); player.y = 0; }
    }
    if(player.y > ROOM_H){
      const passable = isDoorPassable(current.x,current.y,current.x,current.y+1) && player.x>gapMinX && player.x<gapMaxX;
      if(passable) moveToRoom(current.x, current.y+1, 'S');
      else { tryOpenLockedDoor(current.x,current.y+1); player.y = ROOM_H; }
    }

    // attack
    if(player.attackCd>0) player.attackCd -= dt;
    if(player.attacking>0) player.attacking -= dt;
    if(keys['Space'] && player.attackCd<=0){
      player.attackCd = 0.35;
      player.attacking = 0.15;
      const hb = playerAttackHitbox();
      for(const en of curInst().enemies){
        const enRect = {x:en.x-en.r, y:en.y-en.r, w:en.r*2, h:en.r*2};
        if(rectsOverlap(hb, enRect)){
          en.hp -= 1;
          en.hitFlash = 0.15;
          const kb = 120;
          en.x += player.dir.x*kb*dt*6;
          en.y += player.dir.y*kb*dt*6;
          spawnParticles(en.x,en.y, en.type==='boss'?COLORS.chest:COLORS.chaser, 8);
        }
      }
    }

    // bomb placement
    if(keys['KeyB'] && player.bombs>0 && !player._bombLock){
      player.bombs--;
      bombs.push({x:player.x, y:player.y, fuse:1.4});
      player._bombLock = true;
    }
    if(!keys['KeyB']) player._bombLock = false;

    // invuln timer
    if(player.invuln>0) player.invuln -= dt;

    // bombs update
    for(let i=bombs.length-1;i>=0;i--){
      const b = bombs[i];
      b.fuse -= dt;
      if(b.fuse<=0){
        spawnParticles(b.x,b.y, COLORS.bombFuse, 30);
        shake = 10;
        const radius = 90;
        for(const en of curInst().enemies){
          if(dist(en.x,en.y,b.x,b.y) < radius+en.r){
            en.hp -= 3;
            en.hitFlash = 0.2;
          }
        }
        if(dist(player.x,player.y,b.x,b.y) < radius+player.w/2){
          damagePlayer(1);
        }
        tryBreakCrackedNear(b.x,b.y);
        bombs.splice(i,1);
      }
    }

    // enemies update
    const roomInst = curInst();
    for(let i=roomInst.enemies.length-1;i>=0;i--){
      const en = roomInst.enemies[i];
      if(en.hitFlash>0) en.hitFlash -= dt;
      if(en.hp<=0){
        spawnParticles(en.x,en.y, en.type==='boss'?COLORS.chest:'#ffffff', 16);
        roomInst.enemies.splice(i,1);
        continue;
      }
      if(en.type==='chaser' || en.type==='boss'){
        const d = dist(en.x,en.y,player.x,player.y);
        if(d>1){
          const vx = (player.x-en.x)/d, vy=(player.y-en.y)/d;
          en.x += vx*en.speed*dt;
          en.y += vy*en.speed*dt;
        }
      } else if(en.type==='turret'){
        en.shootCd -= dt;
        if(en.shootCd<=0){
          en.shootCd = 1.8;
          const d = dist(en.x,en.y,player.x,player.y);
          const vx=(player.x-en.x)/d, vy=(player.y-en.y)/d;
          projectiles.push({x:en.x,y:en.y,vx:vx*160,vy:vy*160,r:6});
        }
      }
      en.x = clamp(en.x, en.r, ROOM_W-en.r);
      en.y = clamp(en.y, en.r, ROOM_H-en.r);

      if(dist(en.x,en.y,player.x,player.y) < en.r + player.w/2){
        damagePlayer(en.type==='boss'?2:1);
      }
    }

    if(!roomInst.cleared && roomInst.enemies.length===0){
      roomInst.cleared = true;
      if(roomInst.meta.type==='boss'){
        gameWon = true;
        showMessage('¡Mazmorra completada!', 'pulsa reintentar para otra semilla');
      }
    }

    // projectiles
    for(let i=projectiles.length-1;i>=0;i--){
      const p = projectiles[i];
      p.x += p.vx*dt; p.y += p.vy*dt;
      if(p.x<0||p.x>ROOM_W||p.y<0||p.y>ROOM_H){ projectiles.splice(i,1); continue; }
      if(dist(p.x,p.y,player.x,player.y) < p.r+player.w/2){
        damagePlayer(1);
        projectiles.splice(i,1);
      }
    }

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const pt = particles[i];
      pt.life -= dt;
      pt.x += pt.vx*dt; pt.y += pt.vy*dt;
      pt.vx *= 0.9; pt.vy *= 0.9;
      if(pt.life<=0) particles.splice(i,1);
    }

    // chest pickup (item/key/secret rooms)
    const meta = roomInst.meta;
    if((meta.type==='item' || meta.type==='key' || meta.type==='secret') && !roomInst.chestTaken){
      const cx = ROOM_W/2, cy = ROOM_H/2;
      if(dist(player.x,player.y,cx,cy) < 30){
        roomInst.chestTaken = true;
        if(meta.type==='key'){
          player.hasKey = true;
        } else if(meta.type==='item'){
          player.maxBombs = Math.min(player.maxBombs+1, 8);
          player.bombs = Math.min(player.bombs+2, player.maxBombs);
        } else if(meta.type==='secret'){
          player.hp = Math.min(player.hp+2, player.maxHp);
        }
        spawnParticles(cx,cy,COLORS.chest,24);
      }
    }

    if(shake>0) shake = Math.max(0, shake-dt*40);

    updateHud();
  }

  // ---------- Drawing ----------
  function drawWallSide(dirName, state){
    ctx.save();
    let color = COLORS.wall;
    if(state==='locked') color = COLORS.wallLocked;
    else if(state==='cracked') color = COLORS.wallCracked;
    else if(state==='sealed') color = COLORS.wallSealed;

    const hasGap = state==='open';
    ctx.fillStyle = color;

    if(dirName==='N' || dirName==='S'){
      const y = dirName==='N' ? 0 : ROOM_H;
      const yTop = dirName==='N' ? -WALL : ROOM_H;
      if(hasGap){
        ctx.fillRect(-WALL, yTop, (ROOM_W-DOOR_GAP)/2+WALL, WALL);
        ctx.fillRect((ROOM_W+DOOR_GAP)/2, yTop, (ROOM_W-DOOR_GAP)/2+WALL, WALL);
      } else {
        ctx.fillRect(-WALL, yTop, ROOM_W+WALL*2, WALL);
      }
    } else {
      const x = dirName==='W' ? -WALL : ROOM_W;
      if(hasGap){
        ctx.fillRect(x, -WALL, WALL, (ROOM_H-DOOR_GAP)/2+WALL);
        ctx.fillRect(x, (ROOM_H+DOOR_GAP)/2, WALL, (ROOM_H-DOOR_GAP)/2+WALL);
      } else {
        ctx.fillRect(x, -WALL, WALL, ROOM_H+WALL*2);
      }
    }
    ctx.restore();
  }

  function drawRoom(){
    const inst = curInst();
    // floor
    ctx.fillStyle = COLORS.floor;
    ctx.fillRect(0,0,ROOM_W,ROOM_H);
    ctx.strokeStyle = COLORS.floorLine;
    ctx.lineWidth = 1;
    for(let gx=0; gx<=ROOM_W; gx+=38){
      ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,ROOM_H); ctx.stroke();
    }
    for(let gy=0; gy<=ROOM_H; gy+=38){
      ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(ROOM_W,gy); ctx.stroke();
    }

    // walls / doors
    for(const d of DIRS){
      const nx = current.x+d.dx, ny = current.y+d.dy;
      const st = getDoorState(current.x,current.y,nx,ny);
      if(!st){ drawWallSide(d.name, 'solid'); continue; }
      if(!inst.cleared && st==='open'){ drawWallSide(d.name, 'sealed'); }
      else drawWallSide(d.name, st);
    }

    // obstacles
    for(const o of inst.obstacles){
      ctx.fillStyle = COLORS.obstacle;
      ctx.strokeStyle = COLORS.obstacleEdge;
      ctx.lineWidth = 2;
      ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.strokeRect(o.x,o.y,o.w,o.h);
    }

    // chest
    const meta = inst.meta;
    if((meta.type==='item'||meta.type==='key'||meta.type==='secret') && !inst.chestTaken){
      const cx = ROOM_W/2, cy = ROOM_H/2;
      ctx.save();
      ctx.translate(cx,cy);
      ctx.fillStyle = meta.type==='key' ? COLORS.chest : (meta.type==='secret' ? '#7fd1a8' : COLORS.chest);
      ctx.beginPath();
      ctx.moveTo(0,-18); ctx.lineTo(18,0); ctx.lineTo(0,18); ctx.lineTo(-18,0); ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#00000055'; ctx.lineWidth=2; ctx.stroke();
      ctx.restore();
    }

    // room type marker (subtle, top area) for boss room
    if(meta.type==='boss' && !inst.cleared){
      ctx.fillStyle = 'rgba(226,85,90,0.08)';
      ctx.fillRect(0,0,ROOM_W,ROOM_H);
    }
  }

  function drawEnemies(){
    for(const en of curInst().enemies){
      ctx.save();
      ctx.translate(en.x,en.y);
      const flash = en.hitFlash>0;
      if(en.type==='chaser'){
        ctx.fillStyle = flash ? '#ffffff' : COLORS.chaser;
        ctx.beginPath(); ctx.arc(0,0,en.r,0,Math.PI*2); ctx.fill();
      } else if(en.type==='turret'){
        ctx.fillStyle = flash ? '#ffffff' : COLORS.turret;
        ctx.beginPath();
        ctx.moveTo(0,-en.r); ctx.lineTo(en.r,en.r); ctx.lineTo(-en.r,en.r); ctx.closePath();
        ctx.fill();
      } else if(en.type==='boss'){
        ctx.fillStyle = flash ? '#ffffff' : COLORS.chaser;
        ctx.beginPath();
        for(let i=0;i<6;i++){
          const a = Math.PI/3*i - Math.PI/2;
          const px = Math.cos(a)*en.r, py = Math.sin(a)*en.r;
          if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();

      // hp bar for boss
      if(en.type==='boss'){
        const w=60;
        ctx.fillStyle='#00000088';
        ctx.fillRect(en.x-w/2, en.y-en.r-16, w, 6);
        ctx.fillStyle = COLORS.chaser;
        ctx.fillRect(en.x-w/2, en.y-en.r-16, w*(en.hp/en.maxHp), 6);
      }
    }
  }

  function drawProjectiles(){
    ctx.fillStyle = COLORS.projectile;
    for(const p of projectiles){
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
  }

  function drawBombs(){
    for(const b of bombs){
      ctx.save();
      ctx.translate(b.x,b.y);
      ctx.fillStyle = COLORS.bomb;
      ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
      const blink = Math.sin(b.fuse*30) > 0;
      ctx.fillStyle = blink ? COLORS.bombFuse : '#552200';
      ctx.beginPath(); ctx.arc(0,-14,4,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  function drawParticles(){
    for(const pt of particles){
      ctx.globalAlpha = clamp(pt.life/0.4,0,1);
      ctx.fillStyle = pt.color;
      ctx.fillRect(pt.x-2,pt.y-2,4,4);
    }
    ctx.globalAlpha = 1;
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.x, player.y);
    const blink = player.invuln>0 && Math.floor(player.invuln*12)%2===0;
    ctx.fillStyle = blink ? '#ffffff' : COLORS.player;
    const s = player.attacking>0 ? 1.15 : 1;
    ctx.save();
    ctx.scale(s,s);
    ctx.fillRect(-player.w/2,-player.h/2, player.w, player.h);
    ctx.restore();
    // nose indicating facing direction
    ctx.fillStyle = COLORS.playerNose;
    const nx = player.dir.x*16, ny = player.dir.y*16;
    ctx.beginPath();
    ctx.arc(nx,ny,4,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // attack hitbox visualization
    if(player.attacking>0){
      const hb = playerAttackHitbox();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(hb.x,hb.y,hb.w,hb.h);
    }
  }

  function render(){
    ctx.save();
    ctx.clearRect(0,0,CANVAS_W,CANVAS_H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H);

    let sx=0, sy=0;
    if(shake>0){ sx = (Math.random()-0.5)*shake; sy = (Math.random()-0.5)*shake; }
    ctx.translate(WALL+sx, WALL+sy);

    drawRoom();
    drawBombs();
    drawEnemies();
    drawProjectiles();
    drawParticles();
    drawPlayer();

    ctx.restore();
  }

  // ---------- HUD ----------
  function updateHud(){
    const heartsEl = document.getElementById('hearts');
    heartsEl.innerHTML = '';
    const totalHearts = player.maxHp/2;
    for(let i=0;i<totalHearts;i++){
      const filled = player.hp >= (i+1)*2;
      const half = !filled && player.hp > i*2;
      const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
      svg.setAttribute('width','16'); svg.setAttribute('height','16');
      svg.classList.add('heart');
      const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      poly.setAttribute('points','8,2 14,8 8,14 2,8');
      poly.setAttribute('fill', (filled||half) ? '#e2555a' : '#333846');
      poly.setAttribute('stroke','#00000055');
      svg.appendChild(poly);
      heartsEl.appendChild(svg);
    }
    document.getElementById('bombCount').textContent = player.bombs + '/' + player.maxBombs;
    document.getElementById('keyWrap').style.display = player.hasKey ? 'flex' : 'none';
  }

  function buildMinimap(){
    const mm = document.getElementById('minimap');
    mm.innerHTML = '';
    const coords = [...dungeon.rooms.values()];
    const xs = coords.map(r=>r.x), ys = coords.map(r=>r.y);
    const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
    const cols = maxX-minX+1, rows = maxY-minY+1;
    mm.style.gridTemplateColumns = `repeat(${cols}, 10px)`;
    mm.style.gridTemplateRows = `repeat(${rows}, 10px)`;
    for(let y=minY;y<=maxY;y++){
      for(let x=minX;x<=maxX;x++){
        const k = roomKey(x,y);
        const div = document.createElement('div');
        div.className = 'mm-cell';
        const inst = roomInstances.get(k);
        if(inst && inst.visited){
          div.classList.add('visited');
          if(inst.meta.type==='boss') div.classList.add('boss');
          if(inst.meta.type==='item'||inst.meta.type==='key'||inst.meta.type==='secret') div.classList.add('item');
        }
        if(x===current.x && y===current.y) div.classList.add('current');
        div.style.gridColumn = (x-minX+1);
        div.style.gridRow = (y-minY+1);
        mm.appendChild(div);
      }
    }
  }

  function showMessage(text, sub){
    const msg = document.getElementById('msg');
    document.getElementById('msgText').textContent = text;
    document.getElementById('msgSub').textContent = sub || '';
    msg.style.display = 'block';
    document.getElementById('restart').style.display = 'inline-block';
  }

  // ---------- Main loop ----------
  let lastTime = 0;
  function loop(t){
    const dt = Math.min(0.033, (t-lastTime)/1000 || 0);
    lastTime = t;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  newGame();
  requestAnimationFrame(loop);
})();
</script>
